
<h2 class="m-0 b-0 p-0 bg-black text-3xl tracking-tight font-extrabold text-center  text-white">Mis proyectos</h2>

<section class=" b-0 m-0  bg-black text-white justify-evenly mt-0 p-4 flex flex-col gap-2">
  <article *ngFor="let p of projects" class="ml-2 ">
    <h2 class=" bg-black m-2 p-0 b-0 text-2xl font-bold text-center">{{ p.title }}</h2>
    <div class="project-row flex flex-row w-full">
      <div
        class="project-image-container w-1/2"
        (mouseenter)="showOverlay(p.img, '95vw', '95vh')"
        (mouseleave)="hideOverlay()"
      >
        <img [src]="p.img" [alt]="p.title" />
      </div>
      <div class="project-meta flex flex-col items-center  text-center justify-evenly   m-1 p-1 w-1/2">
        <p>
          {{ p.description }}
          <span *ngIf="p.tech.length" class="project-tech-inline">— Tecnologías: {{ p.tech.join(', ') }}</span>
        </p>
        <a class="text-center m-2 text-indigo-500" [href]="p.link" target="_blank" rel="noreferrer">Ir al proyecto</a>
      </div>
    </div>
  </article>
</section>
